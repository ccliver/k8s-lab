apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: k8s-lab-status
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ccliver/k8s-lab
    targetRevision: main
    path: manifests
    directory:
      include: k8s-lab-status.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: k8s-lab-status
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
