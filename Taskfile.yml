# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

env:
  AWS_PROFILE: lab

tasks:
  default:
    silent: true
    cmds:
      - task -l

  deploy:
    desc: Deploy lab (terraform + helm + ingress)
    silent: true
    cmds:
      - task: tf-apply
      - task: kubeconfig
      - task: wait-for-nodes
      - task: helm-install-lbc
      - task: helm-install-cluster-autoscaler
      - task: helm-install-ebs-csi
      - task: helm-install-efs-csi
      - task: helm-install-secrets-manager-csi
      - task: helm-install-argocd
      - task: apply-argocd-ingress
      - task: apply-grafana-ingress
      - task: apply-gp3-storage-class
      - task: apply-io2-storage-class
      - task: apply-efs-storage-class
      - task: install-volume-snapshot-crds
      - task: apply-ebs-volume-snapshot-class
      - task: apply-fake-api-key-secret-provider-class
      - task: apply-k8s-lab-status
      - task: bootstrap-argocd

  destroy:
    desc: Destroy lab
    silent: true
    cmds:
      - task: kubeconfig
      - task: delete-argocd-apps
      - task: delete-postgresql-pvc
      - task: delete-ingress
      - task: drain-and-destroy-nodes
      - task: tf-destroy
      - task: cleanup-orphaned-enis

  tf-init:
    desc: Initialize terraform
    dir: terraform
    silent: true
    cmds:
      - terraform init -backend-config=backend.hcl

  tf-plan:
    desc: Show terraform plan
    dir: terraform
    silent: true
    cmds:
      - terraform init -backend-config=backend.hcl
      - terraform plan

  kubeconfig:
    desc: Add the cluster to ~/.kube/config
    silent: true
    cmds:
      - aws eks update-kubeconfig --name k8s-lab --alias k8s-lab --region us-east-1

  argocd-pf:
    desc: Setup local port forwarding to the ArgoCD pod
    silent: true
    cmds:
      - echo http://127.0.0.1:8080
      - kubectl port-forward -n argocd svc/argo-cd-argocd-server 8080:443 > /dev/null

  k8s-lab-status-pf:
    desc: Setup local port forwarding to the k8s-lab-status pod
    silent: true
    cmds:
      - echo http://127.0.0.1:8000
      - kubectl port-forward -n k8s-lab-status svc/k8s-lab-status 8000:8000 > /dev/null

  argocd-password:
    desc: Get the default admin password for ArgoCD
    silent: true
    cmds:
      - kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath="{.data.password}" | base64 -d

  grafana-password:
    desc: Get the default admin password for Grafana
    silent: true
    cmds:
      - kubectl get secret -n monitoring kube-prometheus-stack-grafana -o jsonpath="{.data.admin-password}" | base64 -d

  alb-dns:
    desc: Print out the ALB DNS name
    silent: true
    cmds:
      - echo "http://$(aws elbv2 describe-load-balancers --query 'LoadBalancers[*].DNSName' --output text | grep k8s-lab)"

  publish-http-canary:
    desc: Build and push http-canary to Docker Hub (TAG=<tag>, default latest)
    silent: true
    vars:
      TAG: '{{.TAG | default "latest"}}'
    cmds:
      - docker buildx inspect multiplatform > /dev/null 2>&1 || docker buildx create --name multiplatform --use
      - |
        docker buildx build \
          --platform linux/amd64,linux/arm64 \
          --tag ccliver/http-canary:{{.TAG}} \
          --push \
          src/http-canary/

  tf-outputs:
    desc: Show terraform outputs
    dir: terraform
    silent: true
    cmds:
      - terraform output

  tf-apply:
    dir: terraform
    silent: true
    cmds:
      - terraform init -backend-config=backend.hcl
      - terraform apply -auto-approve

  wait-for-nodes:
    silent: true
    cmds:
      - kubectl wait --for=condition=Ready nodes --all --timeout=300s

  helm-install-lbc:
    silent: true
    cmds:
      - helm repo add eks https://aws.github.io/eks-charts
      - helm repo update eks
      - |
        helm upgrade --install aws-load-balancer-controller eks/aws-load-balancer-controller \
          -n kube-system \
          --set clusterName=k8s-lab \
          --set serviceAccount.create=true \
          --set serviceAccount.name=aws-load-balancer-controller \
          --set "serviceAccount.annotations.eks\.amazonaws\.com/role-arn=$(terraform -chdir=terraform output -raw aws_lbc_role_arn)" \
          --set vpcId=$(terraform -chdir=terraform output -raw vpc_id) \
          --wait

  helm-install-cluster-autoscaler:
    silent: true
    cmds:
      - helm repo add autoscaler https://kubernetes.github.io/autoscaler
      - helm repo update autoscaler
      - |
        helm install cluster-autoscaler autoscaler/cluster-autoscaler \
        --namespace kube-system \
        --set autoDiscovery.clusterName=k8s-lab \
        --set awsRegion=us-east-1 \
        --set rbac.serviceAccount.name=cluster-autoscaler \
        --set rbac.serviceAccount.annotations."eks\.amazonaws\.com/role-arn"=$(terraform -chdir=terraform output -raw cluster_autoscaler_role_arn)

  helm-install-ebs-csi:
    silent: true
    cmds:
      - helm repo add aws-ebs-csi-driver https://kubernetes-sigs.github.io/aws-ebs-csi-driver
      - helm repo update aws-ebs-csi-driver
      - |
        helm upgrade --install aws-ebs-csi-driver aws-ebs-csi-driver/aws-ebs-csi-driver \
          -n kube-system \
          --set controller.serviceAccount.create=true \
          --set controller.serviceAccount.name=ebs-csi-controller-sa \
          --set "controller.serviceAccount.annotations.eks\.amazonaws\.com/role-arn=$(terraform -chdir=terraform output -raw ebs_csi_role_arn)" \
          --set sidecars.snapshotter.forceEnable=true \
          --wait

  helm-install-efs-csi:
    silent: true
    cmds:
      - helm repo add aws-efs-csi-driver https://kubernetes-sigs.github.io/aws-efs-csi-driver
      - helm repo update aws-efs-csi-driver
      - |
        helm upgrade --install aws-efs-csi-driver aws-efs-csi-driver/aws-efs-csi-driver \
          -n kube-system \
          --set controller.serviceAccount.create=true \
          --set controller.serviceAccount.name=efs-csi-controller-sa \
          --set "controller.serviceAccount.annotations.eks\.amazonaws\.com/role-arn=$(terraform -chdir=terraform output -raw efs_csi_role_arn)" \
          --wait

  helm-install-secrets-manager-csi:
    silent: true
    cmds:
      - helm repo add secrets-store-csi-driver https://kubernetes-sigs.github.io/secrets-store-csi-driver/charts
      - helm repo update secrets-store-csi-driver
      - |
        helm upgrade --install csi-secrets-store secrets-store-csi-driver/secrets-store-csi-driver \
          -n kube-system \
          --set "serviceAccount.annotations.eks\.amazonaws\.com/role-arn=$(terraform -chdir=terraform output -raw secrets_manager_csi_role_arn)" \
          --set "linux.nodeSelector.kubernetes\.io/arch=arm64" \
          --set-json 'linux.affinity={}' \
          --wait
      - helm repo add aws-secrets-manager https://aws.github.io/secrets-store-csi-driver-provider-aws
      - helm repo update aws-secrets-manager
      - |
        helm template secrets-provider-aws aws-secrets-manager/secrets-store-csi-driver-provider-aws \
          -n kube-system \
          | kubectl apply -f -

  helm-install-argocd:
    silent: true
    cmds:
      - helm repo add argo https://argoproj.github.io/argo-helm
      - helm repo update argo
      - |
        helm upgrade --install argo-cd argo/argo-cd \
          -n argocd \
          --create-namespace \
          --set server.service.type=ClusterIP \
          --set server.ingress.enabled=false \
          --set "server.extraArgs={--insecure,--basehref=/argocd,--rootpath=/argocd}" \
          --wait \
          --timeout 10m

  apply-argocd-ingress:
    silent: true
    cmds:
      - ALB_SECURITY_GROUP_ID=$(terraform -chdir=terraform output -raw alb_security_group_id) envsubst < manifests/argocd-ingress.yaml | kubectl apply -f -

  apply-grafana-ingress:
    silent: true
    cmds:
      - kubectl create namespace monitoring
      - ALB_SECURITY_GROUP_ID=$(terraform -chdir=terraform output -raw alb_security_group_id) envsubst < manifests/grafana-ingress.yaml | kubectl apply -f -

  apply-gp3-storage-class:
    silent: true
    cmds:
      - kubectl annotate storageclass gp2 storageclass.kubernetes.io/is-default-class=false
      - kubectl apply -f manifests/gp3-storage-class.yaml

  apply-io2-storage-class:
    silent: true
    cmds:
      - kubectl apply -f manifests/io2-storage-class.yaml

  apply-efs-storage-class:
    silent: true
    cmds:
      - EFS_FILE_SYSTEM_ID=$(terraform -chdir=terraform output -raw efs_file_system_id) envsubst < manifests/efs-storage-class.yaml | kubectl apply -f -

  delete-ingress:
    silent: true
    cmds:
      - kubectl delete ingress -n argocd argocd-server --ignore-not-found=true
      - kubectl delete ingress -n monitoring grafana --ignore-not-found=true
      - echo "Waiting for ALB resources to be deleted..."
      - sleep 300

  drain-and-destroy-nodes:
    silent: true
    cmds:
      - kubectl get nodes -o name | xargs -n1 kubectl drain --ignore-daemonsets --delete-emptydir-data --force --grace-period=60 --disable-eviction || true
      - echo "Nodes drained, waiting for VPC CNI cleanup..."
      - sleep 90
      - terraform -chdir=terraform destroy -target='module.k8s_lab.module.eks[0].module.eks.module.eks_managed_node_group["default"]' -auto-approve

  tf-destroy:
    dir: terraform
    silent: true
    cmds:
      - terraform destroy -auto-approve

  cleanup-orphaned-enis:
    silent: true
    cmds:
      - aws ec2 describe-network-interfaces --filters Name=tag:cluster.k8s.amazonaws.com/name,Values=k8s-lab --query NetworkInterfaces[*].NetworkInterfaceId --output text | xargs -r -n1 aws ec2 delete-network-interface --network-interface-id

  install-volume-snapshot-crds:
    desc: Install VolumeSnapshot CRDs and snapshot controller
    silent: true
    vars:
      SNAPSHOTTER_VERSION: v8.2.0
    cmds:
      - |
        kubectl apply -f https://raw.githubusercontent.com/kubernetes-csi/external-snapshotter/{{.SNAPSHOTTER_VERSION}}/client/config/crd/snapshot.storage.k8s.io_volumesnapshotclasses.yaml
        kubectl apply -f https://raw.githubusercontent.com/kubernetes-csi/external-snapshotter/{{.SNAPSHOTTER_VERSION}}/client/config/crd/snapshot.storage.k8s.io_volumesnapshotcontents.yaml
        kubectl apply -f https://raw.githubusercontent.com/kubernetes-csi/external-snapshotter/{{.SNAPSHOTTER_VERSION}}/client/config/crd/snapshot.storage.k8s.io_volumesnapshots.yaml
        kubectl apply -f https://raw.githubusercontent.com/kubernetes-csi/external-snapshotter/{{.SNAPSHOTTER_VERSION}}/deploy/kubernetes/snapshot-controller/rbac-snapshot-controller.yaml
        kubectl apply -f https://raw.githubusercontent.com/kubernetes-csi/external-snapshotter/{{.SNAPSHOTTER_VERSION}}/deploy/kubernetes/snapshot-controller/setup-snapshot-controller.yaml

  apply-ebs-volume-snapshot-class:
    silent: true
    cmds:
      - kubectl apply -f manifests/ebs-volume-snapshot-class.yaml

  apply-fake-api-key-secret-provider-class:
    silent: true
    cmds:
      - kubectl apply -f manifests/fake-api-key-secret-provider-class.yaml

  apply-k8s-lab-status:
    silent: true
    cmds:
      - POD_SG_ID=$(terraform -chdir=terraform output -raw k8s_lab_status_sg) envsubst < manifests/k8s-lab-status.yaml | kubectl apply -f -

  bootstrap-argocd:
    silent: true
    cmds:
      - kubectl apply -f apps/root.yaml

  delete-argocd-apps:
    desc: Delete ArgoCD root app and wait for cleanup
    silent: true
    cmds:
      - kubectl delete application root -n argocd --wait=true --timeout=5m || true
      - echo "Waiting for app cleanup..."
      - sleep 30

  delete-postgresql-pvc:
    desc: Delete PostgreSQL PVCs so the EBS CSI driver can clean up the volumes before node teardown
    silent: true
    cmds:
      - kubectl delete pvc --all -n postgresql --ignore-not-found=true --wait=true --timeout=2m
