apiVersion: v1
kind: Namespace
metadata:
  name: k8s-lab-status
---
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: fake-api-key
  namespace: k8s-lab-status
spec:
  provider: aws
  parameters:
    objects: |
      - objectName: "k8s-lab-fake-api-key"
        objectType: "secretsmanager"
        objectAlias: "api-key"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-lab-status
  namespace: k8s-lab-status
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::407462665925:role/k8s-lab-status
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: k8s-lab-status-efs
  namespace: k8s-lab-status
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: efs
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: k8s-lab-status
  namespace: k8s-lab-status
data:
  MONITOR_URLS: "https://www.google.com,https://httpbin.org/status/200,http://argo-cd-argocd-server.argocd/healthz,http://kube-prometheus-stack-grafana.monitoring/api/health"
  CHECK_INTERVAL: "30"
  RESULTS_PATH: "/data/results"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-lab-status
  namespace: k8s-lab-status
  labels:
    app: k8s-lab-status
spec:
  replicas: 2
  selector:
    matchLabels:
      app: k8s-lab-status
  template:
    metadata:
      labels:
        app: k8s-lab-status
    spec:
      serviceAccountName: k8s-lab-status
      containers:
        - name: k8s-lab-status
          image: ccliver/k8s-lab-status:latest
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: k8s-lab-status
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: efs
              mountPath: /data/results
            - name: fake-api-key
              mountPath: /mnt/secrets/api-key
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: efs
          persistentVolumeClaim:
            claimName: k8s-lab-status-efs
        - name: fake-api-key
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: fake-api-key
---
apiVersion: v1
kind: Service
metadata:
  name: k8s-lab-status
  namespace: k8s-lab-status
  labels:
    app: k8s-lab-status
spec:
  selector:
    app: k8s-lab-status
  ports:
    - name: http
      port: 8000
      targetPort: http
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: k8s-lab-status
  namespace: k8s-lab-status
  labels:
    app: k8s-lab-status
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: k8s-lab-status
  endpoints:
    - port: http
      path: /metrics
      interval: 60s
